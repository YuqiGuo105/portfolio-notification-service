spring:
  application:
    name: portfolio-notification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 10000

  flyway:
    enabled: true
    locations: classpath:db/migration
    # The Supabase `public` schema already contains existing Portfolio tables
    # (blogs, life_blogs, cv_content, …) that pre-date this service. We must
    # baseline at version 0 so V1__initial_schema.sql actually runs.
    baseline-on-migrate: true
    baseline-version: 0
    # Skip validation against the recorded checksum in flyway_schema_history.
    # Reason: a cosmetic edit to an already-applied V*__*.sql changes the
    # local checksum and blocks startup with FlywayValidateException. We
    # additionally call flyway.repair() on startup (see FlywayConfig.java)
    # so the recorded checksum is brought back in sync; this property is the
    # belt-and-suspenders second line of defense.
    validate-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
      # When KAFKA_CA_CERT contains a PEM-encoded CA bundle, the Kafka client
      # uses it as an inline truststore (Kafka 2.7+ feature). Required for
      # Aiven Kafka because Aiven brokers are signed by a per-project CA that
      # is NOT in the JVM default cacerts.
      ssl.truststore.type: ${KAFKA_TRUSTSTORE_TYPE:PEM}
      ssl.truststore.certificates: ${KAFKA_CA_CERT:}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:portfolio-notification-consumer-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: 50
        session.timeout.ms: 30000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 5
    listener:
      ack-mode: manual
      missing-topics-fatal: false

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

portfolio:
  base-url: ${PORTFOLIO_BASE_URL:https://www.yuqi.site}
  internal-token: ${INTERNAL_API_TOKEN:}
  swagger:
    # Supabase JWT secret (from Supabase Dashboard → Project Settings → API → JWT Secret).
    # BearerTokenValidator uses this to verify Supabase access tokens. Property name
    # kept on the `portfolio.swagger.*` namespace for back-compat with existing
    # Cloud Run / secret bindings; both Swagger UI authorization and protected /api/**
    # requests share the same validator.
    jwt-secret: ${SUPABASE_JWT_SECRET:}
    # Comma-separated list of emails allowed to authenticate via Bearer token
    # (Supabase JWT or Google ID token). Leave empty to allow any verified email.
    allowed-emails: ${SWAGGER_ALLOWED_EMAILS:yuqi.guo17@gmail.com}
    # Google OAuth2 Client ID — used to verify the 'aud' claim in Google ID tokens.
    # Get from GCP Console → APIs & Services → Credentials → OAuth 2.0 Client ID.
    # Leave empty to skip audience verification (less strict but still validates
    # signature + email).
    google-client-id: ${GOOGLE_CLIENT_ID:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Show the Authorize button so users can paste their Supabase Bearer token
    persist-authorization: true
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: Portfolio Notification Service
    description: |
      Internal API for the Yuqi.site notification system.

      **Access policy**
      Swagger UI (`/swagger-ui/**`) and the OpenAPI spec (`/v3/api-docs/**`) are
      public so operators can browse the API without authenticating. Every call
      to `/api/**` (except `/api/health`) still requires one of:

      - `X-Internal-Token: <secret>` — the Portfolio Next.js proxy uses this for
        all server-to-server traffic.
      - `Authorization: Bearer <token>` — a Supabase access token or Google ID
        token. The email claim must be in `SWAGGER_ALLOWED_EMAILS`.

      **How to call protected endpoints from Swagger UI**
      1. Sign in at <https://www.yuqi.site/admin/login> with your allow-listed
         account (email/password or Continue with Google).
      2. Open DevTools → Application → Local Storage and copy the
         `access_token` from the `sb-iyvhmpdfrnznxgyvvkvx-auth-token` entry.
      3. Click **Authorize** above and paste `Bearer <access_token>`.
      4. Allowed emails: `SWAGGER_ALLOWED_EMAILS`.
    version: "0.1.0"
    contact:
      name: Yuqi Guo
      url: https://www.yuqi.site
  allowed-origins: ${ALLOWED_ORIGINS:https://www.yuqi.site,http://localhost:3000}
  # Shared-secret header (X-Internal-Token) required on all /api/subscriptions/* and
  # /api/notifications/* requests. The Next.js Portfolio proxy injects this header
  # server-side; user browsers must NEVER see this value. Generate with:
  #   openssl rand -hex 32
  internal-token: ${INTERNAL_API_TOKEN:}
  kafka:
    content-events-topic: ${KAFKA_TOPIC_CONTENT_EVENTS:portfolio.content-events}
    dlq-topic: ${KAFKA_TOPIC_DLQ:portfolio.dlq}
  token:
    pepper: ${TOKEN_PEPPER:dev-only-pepper-change-me}
  email:
    from: ${SMTP_FROM:noreply@yuqi.site}
    dispatch:
      interval-ms: ${EMAIL_DISPATCH_INTERVAL_MS:15000}
      batch-size: ${EMAIL_DISPATCH_BATCH_SIZE:20}
      max-retry: ${EMAIL_DISPATCH_MAX_RETRY:5}

logging:
  level:
    root: INFO
    site.yuqi.notifications: INFO
    org.apache.kafka: WARN
  pattern:
    console: "{\"ts\":\"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}\",\"level\":\"%level\",\"logger\":\"%logger{36}\",\"thread\":\"%thread\",\"msg\":\"%replace(%msg){'\"','\\\\\"'}\"}%n"

---
spring:
  config:
    activate:
      on-profile: test
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/test-schema.sql
      continue-on-error: false
  kafka:
    bootstrap-servers: localhost:9092
    properties:
      security.protocol: PLAINTEXT
      sasl.mechanism: ""
      sasl.jaas.config: ""
  datasource:
    url: jdbc:h2:mem:notif;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  mail:
    host: smtp.example.test
    port: 25
    username: test
    password: test

portfolio:
  kafka:
    consumer-enabled: false
  token:
    pepper: test-pepper
  internal-token: "test-internal-token"
  email:
    from: "test@example.test"
    dispatch:
      interval-ms: 600000
      initial-delay-ms: 600000
      max-retry: 5
      batch-size: 20

