name: Deploy to Cloud Run

# Triggered manually OR on a tag like v1.2.3
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: short SHA)'
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for Google Workload Identity Federation

env:
  PROJECT_ID:        ${{ vars.GCP_PROJECT_ID }}
  REGION:            ${{ vars.GCP_REGION }}             # e.g. us-central1
  ARTIFACT_REPO:     ${{ vars.ARTIFACT_REPO }}          # e.g. portfolio
  IMAGE_NAME:        portfolio-notification-service
  SERVICE_NAME:      portfolio-notification-service
  WIF_PROVIDER:      ${{ vars.WIF_PROVIDER }}           # projects/.../providers/github
  DEPLOYER_SA_EMAIL: ${{ vars.DEPLOYER_SA_EMAIL }}      # ci-deployer@PROJECT.iam.gserviceaccount.com
  RUNTIME_SA_EMAIL:  ${{ vars.RUNTIME_SA_EMAIL }}       # notification-runtime@PROJECT.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    name: Build → push → deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests package

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push Docker image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}" \
            --region="${REGION}" \
            --platform=managed \
            --service-account="${RUNTIME_SA_EMAIL}" \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=1 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --no-cpu-throttling \
            --timeout=300 \
            --set-env-vars="^|^PORTFOLIO_BASE_URL=${{ vars.PORTFOLIO_BASE_URL }}|ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}|KAFKA_TOPIC_CONTENT_EVENTS=portfolio.content-events|KAFKA_TOPIC_DLQ=portfolio.dlq|KAFKA_TOPIC_NOTIFICATION_ARTICLE=content.notification.article-updates.v1|KAFKA_TOPIC_NOTIFICATION_FEATURE=content.notification.feature-updates.v1|KAFKA_TOPIC_NOTIFICATION_JOBS=content.notification.job-updates.v1|KAFKA_SECURITY_PROTOCOL=SASL_SSL|KAFKA_SASL_MECHANISM=SCRAM-SHA-256|KAFKA_TRUSTSTORE_TYPE=PEM" \
            --update-secrets="SPRING_DATASOURCE_URL=SPRING_DATASOURCE_URL:latest,SPRING_DATASOURCE_USERNAME=SPRING_DATASOURCE_USERNAME:latest,SPRING_DATASOURCE_PASSWORD=SPRING_DATASOURCE_PASSWORD:latest,KAFKA_BROKERS=KAFKA_BROKERS:latest,KAFKA_USERNAME=KAFKA_USERNAME:latest,KAFKA_PASSWORD=KAFKA_PASSWORD:latest,KAFKA_CA_CERT=KAFKA_CA_CERT:latest,SMTP_HOST=SMTP_HOST:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,TOKEN_PEPPER=TOKEN_PEPPER:latest,INTERNAL_API_TOKEN=INTERNAL_API_TOKEN:latest,SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest,SWAGGER_ALLOWED_EMAILS=SWAGGER_ALLOWED_EMAILS:latest"

      - name: Smoke test /api/health/notification
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}" --region="${REGION}" --format='value(status.url)')
          echo "Service URL: $URL"
          curl --fail --max-time 30 "$URL/api/health/notification" || (echo "Health check failed"; exit 1)
